<style>

body{
    margin:0;
    background:#eef3f8;

}

header{
    background:#1d3557;
    color:white;
    text-align:center;
    padding:18px;
    font-size:28px;
    font-weight:bold;
}

#gpsInfo{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

#map{
    height:350px;
    margin:15px;
    border-radius:10px;
    overflow:hidden;
}

#event{
    background:white;
    width:90%;
    max-width:800px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.story{
    background:#f8f9fa;
    border-left:6px solid #457b9d;
    padding:15px;
    border-radius:8px;
    line-height:1.8;
    white-space:pre-line;
}

textarea{
    width:100%;
    height:120px;
    margin-top:15px;
    padding:15px;
    box-sizing:border-box;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    font-size:18px;
}

#result{
    margin-top:20px;
    padding:20px;
    display:none;
    border-radius:10px;
}

.correct{
    background:#d8f3dc;
}

.incorrect{
    background:#ffe5e5;
}

/* ---------- スマホ対応 ---------- */

@media screen and (max-width:768px){

header{
    font-size:22px;
    padding:14px;
}

#map{
    height:300px;
    margin:10px;
}

#gpsInfo,
#positionText{
    margin:10px;
    font-size:15px;
}

#event{
    width:95%;
    margin:10px auto;
    padding:15px;
}

.story{
    font-size:15px;
}

textarea{
    height:140px;
    font-size:16px;
}

button{
    font-size:18px;
    padding:18px;
}

}

let map;
let marker;
let eventMarkers = []; // 災害イベントピン
let dangerCircle; // 範囲表示

let selectedEventMarker = null;

navigator.geolocation.watchPosition(

function(position){

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    document.getElementById("gpsInfo").innerHTML =
    "<b>現在地取得成功</b><br>" +
    "緯度：" + lat.toFixed(5) +
    "<br>経度：" + lon.toFixed(5);

    document.getElementById("positionText").innerHTML =
    "現在地<br>" +
    lat.toFixed(5) +
    "<br>" +
    lon.toFixed(5);

    // 初回のみ地図生成
    if(!map){

        map = L.map('map',{

    zoomControl:true,
    tap:true

}).setView(
            [lat, lon],
            15
        );

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution:
                '&copy; OpenStreetMap contributors'
            }
        ).addTo(map);

        marker = L.circleMarker(
            [lat, lon],
            {
                radius:10,
                color:"blue",
                fillColor:"blue",
                fillOpacity:0.8
            }
        ).addTo(map);

        dangerCircle = L.circle(
            [lat, lon],
            {
                radius:500,
                color:"blue",
                fillColor:"#66ccff",
                fillOpacity:0.15
            }
        ).addTo(map);

        createEventPins(lat, lon);

    }
    else{

        // 現在地更新
        marker.setLatLng([lat, lon]);

        // サークル更新
        dangerCircle.setLatLng([lat, lon]);

    }

    // 地図中心も移動
    map.setView([lat, lon]);

},

function(error){

    document.getElementById("gpsInfo").innerHTML =
    "GPS取得に失敗しました";

},

{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:10000
}

);

const events = [

{
title:"津波警報",
story:`
放課後。

あなたは友人と一緒に帰宅していた。

夕焼けに染まる街並みを歩いていると、突然スマートフォンから大きな警報音が鳴り響く。

「緊急地震速報です。強い揺れに警戒してください。」

直後、大地が大きく揺れ始めた。

電柱がきしみ、周囲から悲鳴が聞こえる。

数分後、さらに新しい通知が届いた。

「津波警報発令。海や川から離れ、直ちに高台へ避難してください。」

友人は焦った様子で言った。

「橋を渡れば近道だ！急ごう！」

しかし、あなたは授業で学んだことを思い出した。

『津波は川を逆流することがある。川や橋には近づかないこと。』

あなたなら、どのように行動するだろうか。
`,
keywords:["高台","避難","離れる","橋を渡らない","川に近づかない"],
success:`

<h3>避難成功</h3>

あなたは友人を呼び止めた。

「橋は危険だ。高台へ行こう。」

友人は少し迷ったが、あなたの言葉にうなずいた。

二人は坂道を駆け上がり、高台の避難所を目指した。

避難所へ到着した直後、遠くから大きな水音が聞こえる。

振り返ると、川の水位が急激に上昇し、橋の周辺は濁流に飲み込まれていた。

友人は青ざめた顔でつぶやいた。

「もし橋を渡っていたら……。」

あなたは安全な場所から状況を見守りながら、自分の判断が命を守ったことを実感した。
`,
failure:`

<h3>避難失敗</h3>

あなたは友人の言葉に従い、橋へ向かった。

「近道なら早く帰れる。」

そう考えたからだ。

しかし橋へ近づくにつれて、水の流れる音が大きくなっていく。

次の瞬間。

濁った水が川からあふれ出した。

「危ない！」

周囲から叫び声が聞こえる。

あなたたちは慌てて引き返そうとしたが、すでに道路の一部は冠水していた。

避難が遅れたことで、安全な高台へ移動する時間を失ってしまった。

災害時には、近道よりも安全な避難行動を優先することが重要である。
`
},

{

平日の夕方。

あなたはデパートで買い物を終え、帰宅しようとしていた。

荷物を抱えながらエレベーターに乗り込み、閉まる扉を眺めている。

床が大きく揺れた。

緊急地震速報が館内に響き渡る。

「緊急地震速報です。身の安全を確保してください。」

エレベーターは急停止し、照明が一瞬消えた。

次の瞬間、非常灯だけが薄暗く点灯する。

どうやら大地震によってエレベーターが停止したらしい。

スマートフォンを見ると通信は不安定になっている。

閉ざされた空間の中で、不安が一気に押し寄せた。

「早くここから出なきゃ……。」

しかし、無理に脱出しようとするのは危険かもしれない。

let currentEvent;
let currentPin = null;


// イベント生成

function generateEvent(){

    currentEvent =
    events[Math.floor(Math.random()*events.length)];

    document.getElementById("eventTitle").innerText =
    currentEvent.title;

    document.getElementById("storyText").innerHTML =
    currentEvent.story;

    document.getElementById("answer").value = "";

    document.getElementById("result").style.display =
    "none";

}

document.getElementById("event").style.display = "none";
window.scrollTo({

    top:0,

    behavior:"smooth"

});

function createEventPins(lat, lon){

    // 古いピン削除
    eventMarkers.forEach(marker=>{
        map.removeLayer(marker);
    });

    eventMarkers = [];

    // 3～10個のランダム数
    const pinCount =
    Math.floor(Math.random()*8)+3;

    for(let i=0;i<pinCount;i++){

        const radius = 0.008;

        const randomLat =
        lat + (Math.random()-0.5)*radius;

        const randomLon =
        lon + (Math.random()-0.5)*radius;

        const marker = L.marker(
            [randomLat, randomLon]
        ).addTo(map);

        marker.bindPopup(
            "災害発生地点"
        );

        marker.on("click",function(){

            generateEvent();

            // クリックしたピンを保存
            currentPin = marker;

            // イベント画面表示
            document.getElementById("event").style.display =
            "block";

            document
            .getElementById("event")
            .scrollIntoView({
                behavior:"smooth"
            });

        });

        eventMarkers.push(marker);

    }

}

function refreshEventPins(){

    if(!marker) return;

    const center =
    marker.getLatLng();

    createEventPins(
        center.lat,
        center.lng
    );

}

//★★★★ここに追加★★★★
function moveCurrentLocation(){

    if(marker){

        const pos = marker.getLatLng();

        map.setView(pos,16);

    }

}

// 判定

function checkAnswer(){

    const answer =
    document.getElementById("answer").value;

    const result =
    document.getElementById("result");

    let correct = false;

    for(let keyword of currentEvent.keywords){

        if(answer.includes(keyword)){
            correct = true;
            break;
        }
    }

	if(correct){

	result.style.display = "block";
	result.className = "correct";

	result.innerHTML = currentEvent.success;

	}else{

	result.style.display = "block";
	result.className = "incorrect";

	result.innerHTML = currentEvent.failure;

	}

    // 3秒後にイベント終了
setTimeout(function(){

    // イベント画面を閉じる
    document.getElementById("event").style.display =
    "none";

    // 結果を消す
    result.style.display = "none";

    // 回答欄初期化
    document.getElementById("answer").value = "";

    // クリックしたピンを削除
    if(currentPin){

        map.removeLayer(currentPin);

        eventMarkers =
        eventMarkers.filter(
            m => m !== currentPin
        );

        currentPin = null;
    }

},3000);

    );

if(selectedEventMarker){

    );

}

// イベント画面を閉じる
document.getElementById("event").style.display =
